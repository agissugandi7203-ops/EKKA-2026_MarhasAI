name: mobile
description: "Genesis.id — Aplikasi pelaporan lingkungan berbasis gamifikasi."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Icons ──
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  lottie: ^3.3.1
  flutter_markdown: ^0.7.3

  # ── Auth & Backend ──
  supabase_flutter: ^2.15.0
  dio: ^5.7.0
  google_sign_in: ^6.2.1

  # ── State Management ──
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # ── Navigation ──
  go_router: ^14.8.1

  # ── Storage & Permissions ──
  shared_preferences: ^2.5.3
  permission_handler: ^11.4.0

  # ── Location ──
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # ── Forms ──
  pin_code_fields: ^8.0.1
  camera: ^0.12.0+1
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  speech_to_text: ^7.4.0
  record: ^6.2.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    # Ilustrasi statis (splash, intro, auth, setup)
    - assets/images/
    - assets/images/intro/
    - assets/images/auth/
    - assets/images/setup/

    # Ikon kustom (SVG/PNG)
    - assets/icons/

    # Animasi Lottie JSON (maskot, streak, achievement, transitions)
    - assets/animations/
    - assets/animations/introduction/
    - assets/animations/mascot/
    - assets/animations/achievements/
    - assets/animations/transitions/
    - assets/animations/artificial/
    - assets/animations/global/
    - assets/animations/onboarding/
    - assets/animations/leaderboard/
